<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Курс — Duckie</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app" v-cloak>
    <app-topbar active="goal"></app-topbar>

    <main class="flow-page">
      <p v-if="loading" class="flow-status">Загрузка…</p>
      <p v-else-if="error" class="flow-status">{{ error }}</p>

      <template v-else>
        <nav class="flow-crumbs" :style="{ '--cat-color': accent }">
          <a href="/goal">Цель</a>
          <template v-if="course.category">
            <span class="flow-crumb-sep">›</span>
            <a :href="`/goal/${course.category.slug}`">{{ course.category.title }}</a>
            <span class="flow-crumb-sep">›</span>
            <a :href="`/goal/${course.category.slug}/${course.subcategory_slug}`">{{ course.subcategory }}</a>
            <span class="flow-crumb-sep">›</span>
            <a :href="`/goal/${course.category.slug}/${course.subcategory_slug}/${course.technology_slug}`">{{ course.technology }}</a>
          </template>
        </nav>

        <div class="course-head">
          <h1 class="course-head-title">{{ course.title }}</h1>
          <p class="course-head-meta">
            <span class="course-head-author">{{ course.author }}</span>
            <span v-if="course.duration"> · {{ course.duration }}</span>
          </p>
        </div>

        <nav class="course-tabs">
          <a class="course-tab on" :href="`/course/${course.id}`">Обзор</a>
          <a class="course-tab" :href="`/course/${course.id}/plan`">План обучения</a>
          <a class="course-tab" :href="`/course/${course.id}/reviews`">Отзывы<span v-if="course.reviews_count"> ({{ course.reviews_count }})</span></a>
          <a class="course-tab" :href="`/course/${course.id}/view`">Просмотр</a>
        </nav>

        <div class="course-hero" :style="{ '--cat-color': accent }">
          <p class="course-hero-rating-row">
            <a class="course-hero-rating" :href="`/course/${course.id}/reviews`">
              <template v-if="course.rating">★ {{ Number(course.rating).toFixed(1) }} · {{ course.reviews_count }} отзывов</template>
              <template v-else>Пока нет оценок</template>
            </a>
          </p>
          <p v-if="course.description" class="course-hero-desc">{{ course.description }}</p>
          <div class="course-actions">
            <button class="btn-primary" :class="{ 'is-goal': isGoal }" :disabled="saving" @click="toggleGoal">
              {{ isGoal ? '✓ Это ваша цель' : 'Сделать целью' }}
            </button>
            <a class="btn-secondary" :href="`/course/${course.id}/view`">▶ Начать просмотр</a>
          </div>
        </div>
      </template>
    </main>
  </div>

  <script src="/static/js/topbar.js"></script>
  <script src="/static/js/course.js"></script>
</body>
</html>
