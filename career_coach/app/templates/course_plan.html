<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>План обучения — Duckie</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app" v-cloak>
    <app-topbar active="goal"></app-topbar>

    <main class="flow-page">
      <p v-if="loading" class="flow-status">Загрузка…</p>
      <p v-else-if="error" class="flow-status">{{ error }}</p>

      <template v-else>
        <div class="course-head">
          <h1 class="course-head-title">{{ course.title }}</h1>
          <p class="course-head-meta">
            <span class="course-head-author">{{ course.author }}</span>
            <span v-if="course.duration"> · {{ course.duration }}</span>
          </p>
        </div>

        <nav class="course-tabs">
          <a class="course-tab" :href="`/course/${course.id}`">Обзор</a>
          <a class="course-tab on" :href="`/course/${course.id}/plan`">План обучения</a>
          <a class="course-tab" :href="`/course/${course.id}/reviews`">Отзывы<span v-if="course.reviews_count"> ({{ course.reviews_count }})</span></a>
          <a class="course-tab" :href="`/course/${course.id}/view`">Просмотр</a>
        </nav>

        <p v-if="!course.lessons.length" class="flow-empty">План скоро появится.</p>
        <ol v-else class="plan-list">
          <li v-for="(l, i) in course.lessons" :key="l.id" class="plan-item">
            <span class="plan-num">{{ i + 1 }}</span>
            <span class="plan-body">
              <span class="plan-title">{{ l.title }}</span>
              <span v-if="l.description" class="plan-desc">{{ l.description }}</span>
            </span>
            <span v-if="l.duration" class="plan-dur">{{ l.duration }}</span>
          </li>
        </ol>
      </template>
    </main>
  </div>

  <script src="/static/js/topbar.js"></script>
  <script src="/static/js/course_plan.js"></script>
</body>
</html>
