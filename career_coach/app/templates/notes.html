<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заметки — Duckie</title>
  <link rel="stylesheet" href="/static/css/style.css?v=2">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app" v-cloak v-if="ready">
    <app-topbar></app-topbar>

    <div class="layout">
      <app-sidebar active="notes"></app-sidebar>
      <main class="content">
        <div class="flow-page">
          <h1 class="view-title">Заметки по курсам</h1>
          <p class="view-sub">Выберите курс — откроется вкладка со всеми заметками по нему.</p>

          <!-- Вкладки курсов -->
          <div class="note-tabs">
            <button v-for="t in tabs" :key="t.key" class="note-tab"
                    :class="{ active: String(t.key) === String(activeKey) }" @click="selectTab(t.key)">
              <span class="note-tab-label">{{ t.title }}</span>
              <span class="note-tab-count">{{ t.count }}</span>
            </button>
            <select class="note-tab-add" v-model="courseToOpen" @change="openCourseTab">
              <option value="">+ Курс…</option>
              <option v-for="c in availableCourses" :key="c.id" :value="c.id">{{ c.title }}</option>
              <option v-if="!hasNoneTab" value="none">Без курса</option>
            </select>
          </div>

          <p v-if="error" class="admin-error">{{ error }}</p>

          <!-- Активная вкладка курса -->
          <template v-if="activeTab">
            <div class="note-tab-head">
              <h2 class="note-tab-title">
                <a v-if="activeTab.course_id" :href="'/course/' + activeTab.course_id">📚 {{ activeTab.title }}</a>
                <span v-else>🗒️ {{ activeTab.title }}</span>
              </h2>
              <button class="btn-primary" @click="startCreate" :disabled="creating">+ Добавить заметку</button>
            </div>

            <!-- Форма новой заметки -->
            <form v-if="creating" class="note-form" @submit.prevent="addNote">
              <input class="note-title-input" v-model="newNote.title" maxlength="200" placeholder="Заголовок">
              <textarea class="note-body-input" v-model="newNote.body" rows="4"
                        placeholder="Текст заметки, конспект, важные мысли…"></textarea>
              <div class="note-form-foot">
                <div class="note-actions">
                  <button class="btn-sm" type="submit" :disabled="busy">Сохранить</button>
                  <button class="btn-sm ghost" type="button" @click="cancelCreate" :disabled="busy">Отмена</button>
                </div>
              </div>
            </form>

            <p v-if="!activeNotes.length && !creating" class="flow-empty">
              В этом курсе пока нет заметок. Нажмите «+ Добавить заметку».
            </p>

            <div v-if="activeNotes.length" class="note-list">
              <article v-for="note in activeNotes" :key="note.id" class="note-card">
                <!-- Режим редактирования -->
                <template v-if="edit && edit.id === note.id">
                  <input class="note-title-input" v-model="edit.title" maxlength="200" placeholder="Заголовок">
                  <textarea class="note-body-input" v-model="edit.body" rows="4"></textarea>
                  <div class="note-form-foot">
                    <div class="note-actions">
                      <button class="btn-sm" @click="saveEdit" :disabled="busy">Сохранить</button>
                      <button class="btn-sm ghost" @click="cancelEdit" :disabled="busy">Отмена</button>
                    </div>
                  </div>
                </template>

                <!-- Обычный вид -->
                <template v-else>
                  <div class="note-card-head">
                    <h3 class="note-card-title">{{ note.title || 'Без заголовка' }}</h3>
                    <div class="note-actions">
                      <button class="btn-sm" @click="startEdit(note)">✏️</button>
                      <button class="btn-sm danger" @click="deleteNote(note)">🗑</button>
                    </div>
                  </div>
                  <p v-if="note.body" class="note-card-body">{{ note.body }}</p>
                  <div class="note-card-meta">
                    <span class="note-date">{{ fmtDate(note.updated_at) }}</span>
                  </div>
                </template>
              </article>
            </div>
          </template>

          <p v-else class="flow-empty">
            Выберите курс из списка «+ Курс…», чтобы завести вкладку и вести заметки.
          </p>
        </div>
      </main>
    </div>
  </div>

  <script src="/static/js/topbar.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notes.js"></script>
</body>
</html>
