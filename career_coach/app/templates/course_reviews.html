<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отзывы о курсе — Duckie</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app" v-cloak>
    <header class="topbar">
      <div class="brand">
        <span class="brand-logo">🦆</span>
        <span class="brand-name">Duckie</span>
        <span class="brand-sub">Career Coach</span>
      </div>
      <a class="btn-secondary" href="/app">← Назад в портал</a>
    </header>

    <main class="reviews-page">
      <p v-if="loading" class="reviews-page-status">Загрузка…</p>
      <p v-else-if="error" class="reviews-page-status">{{ error }}</p>

      <template v-else>
        <nav v-if="course.category" class="reviews-crumbs">
          {{ course.category.icon }} {{ course.category.title }}
          <span v-if="course.subcategory"> › {{ course.subcategory }}</span>
          <span v-if="course.technology"> › {{ course.technology }}</span>
        </nav>

        <div class="reviews-head" :style="{ '--cat-color': (course.category && course.category.color) || '#5d3fd3' }">
          <h1 class="reviews-title">
            <a v-if="course.url" :href="course.url" target="_blank" rel="noopener">{{ course.title }} ↗</a>
            <template v-else>{{ course.title }}</template>
          </h1>
          <p class="reviews-meta">
            <span class="reviews-author">{{ course.author }}</span>
            <span v-if="course.duration"> · {{ course.duration }}</span>
          </p>
          <p v-if="course.description" class="reviews-desc">{{ course.description }}</p>
          <div class="reviews-rating">
            <template v-if="course.rating">
              <span class="reviews-rating-num">★ {{ Number(course.rating).toFixed(1) }}</span>
              <span class="reviews-rating-count">{{ course.reviews_count }} отзывов</span>
            </template>
            <span v-else class="reviews-rating-none">Пока нет оценок</span>
          </div>
        </div>

        <h2 class="section-title">Отзывы</h2>
        <p v-if="!course.reviews.length" class="reviews-empty">
          Пока никто не оставил отзыв об этом курсе. Будьте первым после прохождения 🙂
        </p>
        <ul v-else class="reviews reviews-standalone">
          <li v-for="r in course.reviews" :key="r.id" class="review">
            <span class="review-head">
              <span class="review-author">{{ r.author }}</span>
              <span class="review-stars">{{ stars(r.rating) }}</span>
            </span>
            <span class="review-text">{{ r.text }}</span>
          </li>
        </ul>
      </template>
    </main>
  </div>

  <script src="/static/js/course_reviews.js"></script>
</body>
</html>
