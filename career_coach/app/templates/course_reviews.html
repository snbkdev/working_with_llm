<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отзывы о курсе — Duckie</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app" v-cloak>
    <app-topbar active="goal"></app-topbar>

    <main class="flow-page">
      <p v-if="loading" class="flow-status">Загрузка…</p>
      <p v-else-if="error" class="flow-status">{{ error }}</p>

      <template v-else>
        <div class="course-head">
          <h1 class="course-head-title">{{ course.title }}</h1>
          <p class="course-head-meta">
            <span class="course-head-author">{{ course.author }}</span>
            <span v-if="course.duration"> · {{ course.duration }}</span>
          </p>
        </div>

        <nav class="course-tabs">
          <a class="course-tab" :href="`/course/${course.id}`">Обзор</a>
          <a class="course-tab" :href="`/course/${course.id}/plan`">План обучения</a>
          <a class="course-tab on" :href="`/course/${course.id}/reviews`">Отзывы<span v-if="course.reviews_count"> ({{ course.reviews_count }})</span></a>
          <a class="course-tab" :href="`/course/${course.id}/view`">Просмотр</a>
        </nav>

        <div class="reviews-rating">
          <template v-if="course.rating">
            <span class="reviews-rating-num">★ {{ Number(course.rating).toFixed(1) }}</span>
            <span class="reviews-rating-count">{{ course.reviews_count }} отзывов</span>
          </template>
          <span v-else class="reviews-rating-none">Пока нет оценок</span>
        </div>

        <p v-if="!course.reviews.length" class="reviews-empty">
          Пока никто не оставил отзыв об этом курсе. Будьте первым после прохождения 🙂
        </p>
        <ul v-else class="reviews reviews-standalone">
          <li v-for="r in course.reviews" :key="r.id" class="review">
            <span class="review-head">
              <span class="review-author">{{ r.author }}</span>
              <span class="review-stars">{{ stars(r.rating) }}</span>
            </span>
            <span class="review-text">{{ r.text }}</span>
          </li>
        </ul>
      </template>
    </main>
  </div>

  <script src="/static/js/topbar.js"></script>
  <script src="/static/js/course_reviews.js"></script>
</body>
</html>
