<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Просмотр курса — Duckie</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app" v-cloak>
    <app-topbar active="goal"></app-topbar>

    <main class="flow-page flow-wide">
      <p v-if="loading" class="flow-status">Загрузка…</p>
      <template v-else-if="course">
        <div class="course-head">
          <h1 class="course-head-title">{{ course.title }}</h1>
          <p class="course-head-meta">
            <span class="course-head-author">{{ course.author }}</span>
            <span v-if="course.duration"> · {{ course.duration }}</span>
          </p>
        </div>

        <nav class="course-tabs">
          <a class="course-tab" :href="`/course/${course.id}`">Обзор</a>
          <a class="course-tab" :href="`/course/${course.id}/plan`">План обучения</a>
          <a class="course-tab" :href="`/course/${course.id}/reviews`">Отзывы<span v-if="course.reviews_count"> ({{ course.reviews_count }})</span></a>
          <a class="course-tab on" :href="`/course/${course.id}/view`">Просмотр</a>
        </nav>

        <!-- Нет ни одного видео у уроков -->
        <div v-if="!playable.length" class="view-placeholder">
          <span class="view-placeholder-ico">🎬</span>
          <p class="view-placeholder-text">Видео для этого курса пока не добавлены.</p>
          <p class="view-placeholder-sub">Загляните в «План обучения», чтобы посмотреть программу.</p>
        </div>

        <div v-else class="player">
          <div class="player-main">
            <div class="player-frame">
              <iframe v-if="embedUrl" :src="embedUrl" :title="current.title"
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                      allowfullscreen></iframe>
            </div>
            <h2 v-if="current" class="player-title">{{ current.title }}</h2>
            <p v-if="current && current.description" class="player-desc">{{ current.description }}</p>
          </div>

          <aside class="player-lessons">
            <p class="player-lessons-head">Уроки · {{ playable.length }}</p>
            <button v-for="(l, i) in course.lessons" :key="l.id"
                    class="player-lesson"
                    :class="{ on: current && l.id === current.id, novideo: !l.youtube_id }"
                    :disabled="!l.youtube_id" @click="select(l)">
              <span class="player-lesson-ico">
                <template v-if="!l.youtube_id">🔒</template>
                <template v-else-if="current && l.id === current.id">▶️</template>
                <template v-else>{{ i + 1 }}</template>
              </span>
              <span class="player-lesson-main">
                <span class="player-lesson-title">{{ l.title }}</span>
                <span v-if="l.duration" class="player-lesson-dur">{{ l.duration }}</span>
              </span>
            </button>
          </aside>
        </div>
      </template>
      <p v-else class="flow-status">Курс не найден</p>
    </main>
  </div>

  <script src="/static/js/topbar.js"></script>
  <script src="/static/js/course_view.js"></script>
</body>
</html>
