<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Просмотр курса — Duckie</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app" v-cloak>
    <header class="topbar">
      <div class="brand">
        <span class="brand-logo">🦆</span>
        <span class="brand-name">Duckie</span>
        <span class="brand-sub">Career Coach</span>
      </div>
      <a v-if="courseId" class="btn-secondary" :href="`/course/${courseId}`">← К курсу</a>
    </header>

    <main class="flow-page">
      <p v-if="loading" class="flow-status">Загрузка…</p>
      <template v-else>
        <h1 class="flow-title">{{ title }}</h1>
        <div class="view-placeholder">
          <span class="view-placeholder-ico">🎬</span>
          <p class="view-placeholder-text">Контент курса появится позже.</p>
          <p class="view-placeholder-sub">Здесь будут уроки и видео по плану обучения.</p>
        </div>
      </template>
    </main>
  </div>

  <script src="/static/js/course_view.js"></script>
</body>
</html>
